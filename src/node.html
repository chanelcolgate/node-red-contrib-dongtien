    // ------------------------------------------------------------------
    // CSV helpers (không phụ thuộc thư viện ngoài)
    // ------------------------------------------------------------------
    function csvEscapeField(value) {
      var s = value === undefined || value === null ? '' : String(value);
      if (/[",\n]/.test(s)) {
        s = '"' + s.replace(/"/g, '""') + '"';
      }
      return s;
    }

    function metricsToCsv(metrics) {
      var lines = ['key,name,unit,div'];
      (metrics || []).forEach(function (m) {
        lines.push(
          [
            csvEscapeField(m.key),
            csvEscapeField(m.name),
            csvEscapeField(m.unit),
            csvEscapeField(m.div),
          ].join(','),
        );
      });
      return lines.join('\n');
    }

    // Parser CSV đơn giản, hỗ trợ field có dấu ngoặc kép chứa dấu phẩy/xuống dòng
    function parseCsv(text) {
      var rows = [];
      var row = [];
      var field = '';
      var inQuotes = false;

      for (var i = 0; i < text.length; i++) {
        var c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') {
              field += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            field += c;
          }
        } else if (c === '"') {
          inQuotes = true;
        } else if (c === ',') {
          row.push(field);
          field = '';
        } else if (c === '\n' || c === '\r') {
          if (c === '\r' && text[i + 1] === '\n') i++;
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
        } else {
          field += c;
        }
      }
      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }
      return rows.filter(function (r) {
        return r.length > 1 || (r.length === 1 && r[0] !== '');
      });
    }

    function metricsFromCsv(text) {
      var rows = parseCsv(text);
      if (rows.length === 0) return [];

      var startIdx = 0;
      var header = rows[0].map(function (h) {
        return h.trim().toLowerCase();
      });
      var isHeader =
        header.indexOf('key') !== -1 && header.indexOf('name') !== -1;
      var colIdx = { key: 0, name: 1, unit: 2, div: 3 };
      if (isHeader) {
        startIdx = 1;
        colIdx = {
          key: header.indexOf('key'),
          name: header.indexOf('name'),
          unit: header.indexOf('unit'),
          div: header.indexOf('div'),
        };
      }

      var result = [];
      for (var i = startIdx; i < rows.length; i++) {
        var r = rows[i];
        var key = (r[colIdx.key] || '').trim();
        if (!key) continue;
        result.push({
          key: key,
          name: (r[colIdx.name] || '').trim() || key,
          unit: (r[colIdx.unit] || '').trim(),
          div: parseFloat(r[colIdx.div]) || 1,
        });
      }
      return result;
    }

    function downloadTextFile(filename, text) {
      var blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // ------------------------------------------------------------------
    // Editable list dùng chung cho bảng mapping (key/name/unit/div)
    // ------------------------------------------------------------------
    function metricsListInit($list, metrics) {
      $list.editableList({
        addButton: 'Thêm dòng',
        removable: true,
        sortable: true,
        height: 300,
        header: $('<div/>')
          .css({ display: 'flex' })
          .append(
            $('<div/>')
              .css({
                width: '18%',
                display: 'inline-block',
                fontWeight: 'bold',
              })
              .text('Key'),
            $('<div/>')
              .css({
                width: '37%',
                display: 'inline-block',
                fontWeight: 'bold',
              })
              .text('Tên hiển thị'),
            $('<div/>')
              .css({
                width: '18%',
                display: 'inline-block',
                fontWeight: 'bold',
              })
              .text('Đơn vị'),
            $('<div/>')
              .css({
                width: '18%',
                display: 'inline-block',
                fontWeight: 'bold',
              })
              .text('Độ chia'),
          ),
        addItem: function (container, _index, data) {
          data = data || {};
          var row = $('<div/>')
            .css({ display: 'flex', gap: '4px' })
            .appendTo(container);

          var keyInput = $('<input/>', { type: 'text', placeholder: 'VD: Ua' })
            .css({ width: '18%' })
            .val(data.key || '')
            .appendTo(row);

          var nameInput = $('<input/>', {
            type: 'text',
            placeholder: 'VD: Phase A Voltage',
          })
            .css({ width: '38%' })
            .val(data.name || '')
            .appendTo(row);

          var unitInput = $('<input/>', {
            type: 'text',
            placeholder: 'VD: V, A, kW...',
          })
            .css({ width: '18%' })
            .val(data.unit || '')
            .appendTo(row);

          var divInput = $('<input/>', {
            type: 'number',
            step: 'any',
            placeholder: 'VD: 1000',
          })
            .css({ width: '18%' })
            .val(data.div !== undefined && data.div !== null ? data.div : 1)
            .appendTo(row);

          container.data('_inputs', {
            keyInput: keyInput,
            nameInput: nameInput,
            unitInput: unitInput,
            divInput: divInput,
          });
        },
      });

      (metrics || []).forEach(function (m) {
        $list.editableList('addItem', m);
      });
    }

    function metricsListGetValue($list) {
      var result = [];
      $list.editableList('items').each(function () {
        var inputs = $(this).data('_inputs');
        if (!inputs) return;
        var key = (inputs.keyInput.val() || '').trim();
        if (!key) return;
        result.push({
          key: key,
          name: (inputs.nameInput.val() || '').trim() || key,
          unit: (inputs.unitInput.val() || '').trim(),
          div: parseFloat(inputs.divInput.val()) || 1,
        });
      });
      return result;
    }

    function metricsListReplace($list, metrics) {
      $list.editableList('empty');
      (metrics || []).forEach(function (m) {
        $list.editableList('addItem', m);
      });
    }

    // ==================================================================
    // Config node: dongtien-meter-config
    // ==================================================================
    RED.nodes.registerType('dongtien-meter-config', {
      category: 'config',
      defaults: {
        name: { value: '', required: true },
        device: { value: '' },
        metrics: { value: [] },
      },
      label: function () {
        return this.name || this.device || 'meter-config';
      },
      oneditprepare: function () {
        var $list = $('#node-config-input-metrics-container');
        metricsListInit($list, this.metrics);

        // Preset
        $('.dongtien-preset-btn').on('click', function () {
          var key = $(this).data('preset');
          var tpl = DONGTIEN_PRESETS[key];
          if (!tpl) return;

          if (
            $list.editableList('length') > 0 &&
            !window.confirm(
              'Thao tác này sẽ thay thế toàn bộ bảng mapping hiện tại. Tiếp tục?',
            )
          ) {
            return;
          }

          metricsListReplace($list, tpl.metrics);
          if (tpl.device && !$('#node-config-input-device').val()) {
            $('#node-config-input-device').val(tpl.device);
          }
        });

        // Export CSV
        $('#node-config-export-csv').on('click', function () {
          var metrics = metricsListGetValue($list);
          var name = $('#node-config-input-name').val() || 'meter-config';
          downloadTextFile(
            name.replace(/[^\w-]+/g, '_') + '.csv',
            metricsToCsv(metrics),
          );
        });

        // Import CSV
        $('#node-config-import-csv-file').on('change', function (evt) {
          var file = evt.target.files && evt.target.files[0];
          if (!file) return;

          var reader = new FileReader();
          reader.onload = function (e) {
            try {
              var metrics = metricsFromCsv(String(e.target.result));
              if (metrics.length === 0) {
                window.alert(
                  'Không đọc được dòng dữ liệu hợp lệ nào trong file CSV.',
                );
                return;
              }
              if (
                $list.editableList('length') > 0 &&
                !window.confirm(
                  'Import sẽ thay thế toàn bộ bảng mapping hiện tại bằng ' +
                    metrics.length +
                    ' dòng từ file CSV. Tiếp tục?',
                )
              ) {
                return;
              }
              metricsListReplace($list, metrics);
            } catch (err) {
              window.alert('Lỗi đọc file CSV: ' + err.message);
            }
          };
          reader.readAsText(file);
          $(this).val('');
        });
      },
      oneditsave: function () {
        var $list = $('#node-config-input-metrics-container');
        this.metrics = metricsListGetValue($list);
      },
    });

    // ==================================================================
    // Node chính: dongtien-insert
    // ==================================================================
    RED.nodes.registerType('dongtien-insert', {
      category: 'Dong Tien',
      color: '#927FBF',
      defaults: {
        name: { value: '' },
        meterConfig: {
          value: '',
          type: 'dongtien-meter-config',
          required: true,
        },
        factory: { value: 'Dong Tien Paper Long An', required: true },
        transformer: { value: '3000KVA' },
        parentSystem: { value: 'MCC XEO' },
        subSystem: { value: '' },
        measurement: { value: 'electric_measurement', required: true },
        db: { value: 'dongtien', required: true },
        precision: { value: 'ns' },
        shiftVar: { value: 'shift' },
      },
      inputs: 1,
      outputs: 1,
      icon: 'font-awesome/fa-bolt',
      paletteLabel: 'dongtien-insert',
      label: function () {
        if (this.name) return this.name;
        var cfg = RED.nodes.node(this.meterConfig);
        return (cfg && (cfg.name || cfg.device)) || 'dongtien-insert';
      },
      labelStyle: function () {
        return this.name ? 'node_label_italic' : '';
      },
    });
  })();
</script>

<script type="text/html" data-help-name="dongtien-meter-config">
  <p>
    Config node dùng chung: chứa bảng mapping "biến kỹ thuật → tên hiển thị /
    đơn vị / độ chia" cho một loại đồng hồ hoặc cảm biến. Có thể tạo nhiều
    template (iLEC MFM300, Arcel ACM 96L E4, CHINT PD7777, cảm biến rung...) và
    dùng chung cho nhiều node <code>dongtien-insert</code>.
  </p>
  <ul>

<script type="text/html" data-help-name="dongtien-insert">
  <p>
    Node dùng chung cho các đồng hồ đo điện / cảm biến. Chọn một
    <b>Meter Config</b> (config node chứa bảng mapping key/name/unit/div) rồi
    cấu hình các tag định danh vị trí lắp đặt
    (factory/transformer/parent_system/sub_system). Node nhận dữ liệu thô từ
    PLC/Modbus, ánh xạ theo Meter Config đã chọn, và xuất ra InfluxDB Line
    Protocol.
  </p>

  <h3>Input</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>
      Có dạng
      <code>{ [machine_key]: [{ ts, values: { Ua: 220000, ... } }] }</code>.
    </dd>
  </dl>

  <h3>Output</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>Chuỗi Line Protocol.</dd>
    <dt>db <span class="property-type">string</span></dt>
    <dd>Tên database InfluxDB.</dd>
    <dt>precision <span class="property-type">string</span></dt>
    <dd>Độ chính xác timestamp.</dd>
  </dl>

  <h3>Cấu hình</h3>
  <ul>
    <li>
      <b>Meter Config</b>: chọn (hoặc tạo mới bằng nút +, sửa bằng nút bút chì)
      template mapping cho loại đồng hồ/cảm biến đang dùng.
    </li>
    <li>
      <b>Tag factory/transformer/parent_system/sub_system</b>: metadata vị trí
      lắp đặt.
    </li>
  </ul>
</script>
