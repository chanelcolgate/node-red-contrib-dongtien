    function metricsListInit($list, metrics) {
  	  $list.editableList({
  	  	addButton: "Add keys",
  	  	removable: true,
  	  	sortable: true,
  	  	height: 260,
  	  	header: $('<div/>').css({ display: 'flex' }).append(
  	  		$('<div/>').css({ width: '18%', display: 'inline-block', fontWeight: 'bold' }).text('Key'),
  	  		$('<div/>').css({ width: '37%', display: 'inline-block', fontWeight: 'bold' }).text('Name'),
  	  		$('<div/>').css({ width: '18%', display: 'inline-block', fontWeight: 'bold' }).text('Unit'),
  	  		$('<div/>').css({ width: '18%', display: 'inline-block', fontWeight: 'bold' }).text('Div'),
  	  	),
        addItem: function (container, _index, data) {
          data = data || {};
          var row = $('<div/>').css({ display: 'flex', gap: '4px' }).appendTo(container);

          var keyInput = $('<input/>', {
            type: 'text',
            placeholder: 'Exp: Ua',
          })
            .css({ width: '18%' })
            .val(data.key || '')
            .appendTo(row);

          var nameInput = $('<input/>', {
            type: 'text',
            placeholder: 'Exp: Phase A Voltage',
          })
            .css({ width: '38%' })
            .val(data.name || '')
            .appendTo(row);

          var unitInput = $('<input/>', {
            type: 'text',
            placeholder: 'Exp: V, A, kW...',
          })
            .css({ width: '18%' })
            .val(data.unit || '')
            .appendTo(row);

          var divInput = $('<input/>', {
            type: 'number',
            placeholder: 'Exp: 1000',
          })
            .css({ width: '18%' })
            .val(data.div !== undefined && data.div !== null ? data.div : 1)
            .appendTo(row);

          container.data('_inputs', {
            keyInput: keyInput,
            nameInput: nameInput,
            unitInput: unitInput,
            divInput: divInput,
          });
        },
  	  });

      (metrics || []).forEach(function (m) {
        $list.editableList('addItem', m);
      });
    }

    function metricsListGetValue($list) {
      var result = [];
      $list.editableList('items').each(function () {
        var inputs = $(this).data('_inputs');
        if (!inputs) return;
        var key = (inputs.keyInput.val() || '').trim();
        if (!key) return;
        result.push({
          key: key,
          name: (inputs.nameInput.val() || '').trim() || key,
          unit: (inputs.unitInput.val() || '').trim(),
          div: parseFloat(inputs.divInput.val()) || 1,
        });
      });
      return result;
    }

        var node = this;
        var $list = $('#node-input-metrics-container');

        metricsListInit($list, node.metrics);

        $('#node-input-deviceType').on('change', function () {
          var type = $(this).val();
          if (type === 'custom') return;
          var tpl = DONGTIEN_DEVICE_TEMPLATES[type];
          if (tpl && !$('#node-input-device').val()) {
            $('#node-input-device').val(tpl.device);
          }
        });

        $('#node-load-default-metrics').on('click', function() {
          var type = $('#node-input-deviceType').val();
          var tpl = DONGTIEN_DEVICE_TEMPLATES[type];
          if (!tpl) return;

          if (
            $list.editableList('length') > 0 &&
            !window.confirm(
              'This operation will replace the entire current mapping table with the default one."' +
              type +
              '". Continue?',
            )
          ) {
            return;
          }

          $list.editableList('empty');
          tpl.metrics.forEach(function (m) {
            $list.editableList('addItem',m);
          });
          if (tpl.device) {
            $('#node-input-device').val(tpl.device);
          }
        });
      },
      oneditsave: function () {
        var $list = $('#node-input-metrics-container');
        this.metrics = metricsListGetValue($list);
      }
    });

</script>

<script type="text/html" data-help-name="dongtien-insert">
  <p>
    A shared node for electricity meters (iLEC MFM300, Arcel ACM 96L E4, CHINT
    PD7777, or other custom models). It receives raw data from PLC/Modbus, maps
    it to configured variable names, units, and scales; attaches device metadata
    (factory, transformer, parent_system, sub_system, device, shift) as tags;
    and outputs the result in InfluxDB Line Protocol format.
  </p>

  <h3>Input</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">object</span></dt>
    <dd>
      Format
      <code>{ [machine_key]: [{ts, value: {Ua: 220000, Ib: 1500, ...}}] }</code
      >. Node take <code>machine_key</code> the first element in the payload to
      be used as a tag <code>machine</code>.
    </dd>
  </dl>

  <h3>Output</h3>
  <dl class="message-properties">
    <dt>payload <span class="property-type">string</span></dt>
    <dd>
      Line Protocol string, where each line corresponds to a metric that matches
      the configured mapping table.
    </dd>
    <dt>db <span class="property-type">string</span></dt>
    <dd>
      The InfluxDB database name, used by the downstream data writing node.
    </dd>
    <dt>precision <span class="property-type">string</span></dt>
    <dd>The timestamp precision (default is "ns").</dd>
  </dl>

  <h3>Configuration</h3>
  <ul>
    <li>
      <b>Device Type</b>: Select from pre-defined mapping templates (iLEC MFM300
      / Arcel ACM 96L E4 / CHINT PD7777) or choose "custom".
    </li>
    <li>
      <b>Load Defaults</b>: Automatically populates the mapping table based on
      the selected device type.
    </li>
    <li>
      <b>Device/Factory/Transformer/Parent System/Sub-system Tags</b>: Metadata
      for device hierarchy, attached to every data point.
    </li>
    <li>
      <b>Metric Mapping</b>: A 4-column table including: Key (from raw
      <code>values</code>), Display Name (<code>name</code> tag), Unit (<code
        >unit</code
      >
      tag), and Divider (value to divide the raw input by to get the final
      <code>value</code> field).
    </li>
    <li>
      <b>Global var "shift"</b>: The name of the global context variable
      containing the current work shift (default is <code>shift</code>).
    </li>
  </ul>
</script>
